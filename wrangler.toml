name = "healthbasket"
compatibility_date = "2024-09-23"

# ── D1 Database binding ──────────────────────────────────────────
# After running: npx wrangler d1 create healthbasket-db
# Replace the database_id below with the one printed in the terminal

[[d1_databases]]
binding = "DB"
database_name = "healthbasket-db"
database_id   = "baefe6ac-3d61-445c-a53c-5cebcb118aea"

# ── Environment variables ────────────────────────────────────────
[vars]
ADMIN_SECRET = "changeme_use_wrangler_secret_put"

# For production, set secrets via:
#   npx wrangler secret put ADMIN_SECRET
